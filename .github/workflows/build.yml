name: CI-CD
# CI/CD Pipeline for Morpheus Lumerin Node
# 
# Branch Strategy:
#   • dev: Build and test only (no deployment)
#   • test: Build, test, and deploy to AWS DEV environment (Titan dev + Morpheus dev consumer node)
#   • main: Build, test, create release, and deploy to AWS PRD environment (Titan lmn + Morpheus prd consumer/provider nodes)
#
# Key Features:
#   • Optimized Docker builds with GitHub Actions caching
#   • Multi-platform container images (linux/amd64, linux/arm64)
#   • Cross-platform executables (Linux, macOS, Windows)
#   • Automated deployments to AWS Environments via GitHub Actions (Titan and Morpheus)
#   • Health check verification with version matching

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create updated Morpheus-Lumerin-Node release"
        required: true
        type: boolean
      build_all_os:
        description: "Build all OS & container image"
        required: true
        type: boolean
      create_deployment:
        description: "Deploy to hosted environments"
        required: true
        type: boolean

  push:
    branches:
      - main
      - test
      - dev
      - cicd/*

    paths: [".github/**", "ui-desktop/**", "ui-core/**", "proxy-router/**", "cli/**"]

  # pull_request:
  #   types: [opened, reopened, synchronize]
  #   paths: [".github/**", "ui-desktop/**", "ui-core/**", "proxy-router/**", "cli/**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  TEST_ENV_VAR: "test"

jobs:
  Go-Module-Verify:
    name: Verify Go Modules
    if: |
      github.repository == 'MorpheusAIs/Morpheus-Lumerin-Node' &&
      (
        (github.event_name == 'push' && (startsWith(github.ref, 'refs/heads/cicd/') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test' || github.ref == 'refs/heads/dev')) ||
        (github.event_name == 'workflow_dispatch') 
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"
          cache-dependency-path: |
            proxy-router/go.sum
            cli/go.sum

      - name: Verify proxy-router go.mod/go.sum are in sync
        working-directory: proxy-router
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo ""
            echo "❌ proxy-router/go.mod or go.sum is out of date!"
            echo "Run 'cd proxy-router && go mod tidy' locally and commit the changes."
            exit 1
          fi
          echo "✅ proxy-router go.mod/go.sum are in sync"

      - name: Verify cli go.mod/go.sum are in sync
        working-directory: cli
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo ""
            echo "❌ cli/go.mod or go.sum is out of date!"
            echo "Run 'cd cli && go mod tidy' locally and commit the changes."
            exit 1
          fi
          echo "✅ cli go.mod/go.sum are in sync"

  Generate-Tag:
    runs-on: ubuntu-latest
    name: Generate Tag Name
    if: |
      github.repository == 'MorpheusAIs/Morpheus-Lumerin-Node' &&
      (
        (github.event_name == 'push' && (startsWith(github.ref, 'refs/heads/cicd/') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test' || github.ref == 'refs/heads/dev')) ||
        (github.event_name == 'workflow_dispatch') 
      )
    outputs:
      tag_name: ${{ steps.gen_tag_name.outputs.tag_name }}
      vtag: ${{ steps.gen_tag_name.outputs.vtag }}
      vfull: ${{ steps.gen_tag_name.outputs.vfull }}
      image_name: ${{ steps.gen_tag_name.outputs.image_name }}
      tee_image_name: ${{ steps.gen_tag_name.outputs.tee_image_name }}
      artifacts_base_url: ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ steps.gen_tag_name.outputs.tag_name }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine tag name
        id: gen_tag_name
        shell: bash
        run: |
          IMAGE_NAME="ghcr.io/morpheusais/morpheus-lumerin-node"
          VMAJ_NEW=5
          VMIN_NEW=0
          VPAT_NEW=0
          set +o pipefail
          VLAST=$(git describe --tags --abbrev=0 --match='v[1-9]*' refs/remotes/origin/main 2>/dev/null | cut -c2-)

          if [ -n "$VLAST" ]; then
              eval $(echo "$VLAST" | awk -F '.' '{print "VMAJ="$1" VMIN="$2" VPAT="$3}')
          else
              VMAJ=0
              VMIN=0
              VPAT=0
          fi

          if [ "$GITHUB_REF_NAME" = "main" ]; then
              if [ "$VMAJ_NEW" -gt "$VMAJ" ]; then
                  VMAJ=$VMAJ_NEW
                  VMIN=$VMIN_NEW
                  VPAT=$VPAT_NEW
              else
                  VMIN=$((VMIN+1))
                  VPAT=0
              fi
              VFULL=${VMAJ}.${VMIN}.${VPAT}
              VTAG=v$VFULL
          else
              MB=$(git merge-base refs/remotes/origin/main HEAD)
              VPAT=$(git rev-list --count --no-merges ${MB}..HEAD)
              VFULL=${VMAJ}.${VMIN}.${VPAT}
              RNAME=${GITHUB_REF_NAME##*/}
              [ "$GITHUB_EVENT_NAME" = "pull_request" ] && RNAME=pr${GITHUB_REF_NAME%/merge}
              VTAG=v${VFULL}-${RNAME}
          fi

          # Output variables for use in subsequent jobs environment
          echo "tag_name=${VTAG}" >> $GITHUB_OUTPUT
          echo "vtag=${VTAG}" >> $GITHUB_OUTPUT
          echo "vfull=${VFULL}" >> $GITHUB_OUTPUT
          echo "image_name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "tee_image_name=${IMAGE_NAME}-tee" >> $GITHUB_OUTPUT
          echo "✅ New Build Tag: $VTAG" >> $GITHUB_STEP_SUMMARY
          echo "✅ Docker Image: ${IMAGE_NAME}:${VTAG}" >> $GITHUB_STEP_SUMMARY
          echo "✅ TEE Image: ${IMAGE_NAME}-tee:${VTAG}" >> $GITHUB_STEP_SUMMARY
          echo "❌ Old Major Tag: $VLAST"  >> $GITHUB_STEP_SUMMARY

  Build-Proxy-Router-Test:
    name: Test Proxy Router Docker Image
    if: |
      github.repository == 'MorpheusAIs/Morpheus-Lumerin-Node' &&
      (
        (github.event_name == 'push' && (startsWith(github.ref, 'refs/heads/cicd/') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test' || github.ref == 'refs/heads/dev')) ||
        (github.event_name == 'workflow_dispatch') 
      )
    runs-on: ubuntu-latest
    needs:
      - Generate-Tag
      - Go-Module-Verify
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker Image to Test
        run: |
          BUILDTAG=${{ needs.Generate-Tag.outputs.tag_name }}
          BUILDIMAGE=${{ needs.Generate-Tag.outputs.image_name }}
          BUILDCOMMIT=${{ github.sha }}
          docker buildx build \
            --platform linux/amd64 \
            --build-arg TAG_NAME=$BUILDTAG \
            --build-arg COMMIT=$BUILDCOMMIT \
            --cache-from type=gha \
            --cache-to type=gha,mode=min \
            --load \
            -t $BUILDIMAGE:$BUILDTAG \
            -f proxy-router/Dockerfile \
            proxy-router || (echo "❌ Failed to build image with tag: $BUILDIMAGE:$BUILDTAG" && exit 1)
          echo "✅ Proxy-Router Test Build Successful!"

      - name: Run Docker Tests
        uses: ./.github/actions/docker_test
        with:
          image: "${{ needs.Generate-Tag.outputs.image_name }}:${{ needs.Generate-Tag.outputs.tag_name }}"
          private_key: ${{ secrets.TEST_PRIVATE_KEY }}

  GHCR-Build-and-Push:
    name: Build & Push Docker Image
    if: |
      github.repository == 'MorpheusAIs/Morpheus-Lumerin-Node' &&
      (
        (github.event_name == 'push' && (startsWith(github.ref, 'refs/heads/cicd/')|| github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test')) ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.build_all_os == 'true') 
      )
    needs:
      - Generate-Tag
      - Build-Proxy-Router-Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.capture-digest.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Multi-Platform Docker Image
        run: |
          BUILDTAG=${{ needs.Generate-Tag.outputs.tag_name }}
          BUILDIMAGE=${{ needs.Generate-Tag.outputs.image_name }}
          BUILDCOMMIT=${{ github.sha }}
          
          # Build multi-platform for main and test branches to support all architectures:
          # - linux/amd64: Linux x64 servers, Mac Intel (via Docker VM)
          # - linux/arm64: Raspberry Pi, AWS Graviton, Mac Apple Silicon (via Docker VM)
          # Feature branches stay single-platform for faster iteration
          if [[ "${{ github.ref_name }}" == feat/* ]]; then
            PLATFORMS="linux/amd64"
            echo "🚀 Building single platform (amd64) for faster feature branch builds"
          else
            PLATFORMS="linux/amd64,linux/arm64"
            echo "🚀 Building multi-platform container image for: $PLATFORMS"
          fi
          
          docker buildx build \
            --platform $PLATFORMS \
            --build-arg TAG_NAME=$BUILDTAG \
            --build-arg COMMIT=$BUILDCOMMIT \
            --cache-from type=gha \
            --cache-to type=gha,mode=min \
            --metadata-file /tmp/build-metadata.json \
            --push \
            -t $BUILDIMAGE:$BUILDTAG \
            -f proxy-router/Dockerfile \
            proxy-router || (echo "❌ Failed to push image with tag: $BUILDIMAGE:$BUILDTAG" && exit 1)
          echo "✅ Proxy-Router Build and Push of $BUILDIMAGE:$BUILDTAG Successful!"

      - name: Capture image digest
        id: capture-digest
        run: |
          DIGEST=$(jq -r '.["containerimage.digest"]' /tmp/build-metadata.json)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "📋 Image digest: \`$DIGEST\`" >> $GITHUB_STEP_SUMMARY

      - name: Sign image with cosign (keyless)
        run: |
          BUILDIMAGE=${{ needs.Generate-Tag.outputs.image_name }}
          DIGEST=${{ steps.capture-digest.outputs.digest }}
          cosign sign --yes "$BUILDIMAGE@$DIGEST"
          echo "🔏 Image signed: \`$BUILDIMAGE@$DIGEST\`" >> $GITHUB_STEP_SUMMARY

      - name: Push Latest Tags
        if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test' }}
        run: |
          BUILDIMAGE=${{ needs.Generate-Tag.outputs.image_name }}
          BUILDTAG=${{ needs.Generate-Tag.outputs.tag_name }}
          
          # Use imagetools to create latest tags as aliases to the multi-arch manifest
          # This preserves all architectures (unlike docker pull/tag/push which only gets the runner's arch)
          if [ "${{ github.ref_name }}" == "main" ]; then
            LATEST_TAG="latest"
          else
            LATEST_TAG="latest-test"
          fi
          
          docker buildx imagetools create -t $BUILDIMAGE:$LATEST_TAG $BUILDIMAGE:$BUILDTAG || (echo "❌ Failed to create :$LATEST_TAG tag" && exit 1)
          echo "✅ Proxy-Router Push $BUILDIMAGE:$LATEST_TAG Tag Successful!"

  GHCR-Build-and-Push-TEE:
    name: Build & Push TEE Docker Image
    if: |
      github.repository == 'MorpheusAIs/Morpheus-Lumerin-Node' &&
      (
        (github.event_name == 'push' && (startsWith(github.ref, 'refs/heads/cicd/')|| github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test')) ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.build_all_os == 'true') 
      )
    needs:
      - Generate-Tag
      - GHCR-Build-and-Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.capture-digest.outputs.digest }}
      rtmr3: ${{ steps.compute-rtmr3.outputs.rtmr3 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push TEE Docker Image
        run: |
          BUILDTAG=${{ needs.Generate-Tag.outputs.tag_name }}
          BASE_IMAGE=${{ needs.Generate-Tag.outputs.image_name }}:$BUILDTAG
          TEE_IMAGE="${{ needs.Generate-Tag.outputs.image_name }}-tee"
          
          echo "🔒 Building TEE-hardened image from base: $BASE_IMAGE"
          
          # TEE image is amd64-only (Intel TDX and AMD SEV are both x86_64)
          docker buildx build \
            --platform linux/amd64 \
            --build-arg BASE_IMAGE=$BASE_IMAGE \
            --metadata-file /tmp/tee-build-metadata.json \
            --push \
            -t $TEE_IMAGE:$BUILDTAG \
            -f proxy-router/Dockerfile.tee \
            proxy-router || (echo "❌ Failed to push TEE image" && exit 1)
          echo "✅ TEE Image pushed: $TEE_IMAGE:$BUILDTAG"

      - name: Capture TEE image digest
        id: capture-digest
        run: |
          DIGEST=$(jq -r '.["containerimage.digest"]' /tmp/tee-build-metadata.json)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "📋 TEE image digest: \`$DIGEST\`" >> $GITHUB_STEP_SUMMARY

      - name: Sign TEE image with cosign (keyless)
        run: |
          TEE_IMAGE="${{ needs.Generate-Tag.outputs.image_name }}-tee"
          DIGEST=${{ steps.capture-digest.outputs.digest }}
          cosign sign --yes "$TEE_IMAGE@$DIGEST"
          echo "🔏 TEE image signed: \`$TEE_IMAGE@$DIGEST\`" >> $GITHUB_STEP_SUMMARY

      - name: Load SecretVM artifact config
        id: secretvm-config
        run: |
          source .github/tee/secretvm.env
          echo "release=$SECRETVM_RELEASE" >> $GITHUB_OUTPUT
          echo "rootfs_variant=$SECRETVM_ROOTFS_VARIANT" >> $GITHUB_OUTPUT
          echo "rootfs_url=$SECRETVM_ROOTFS_TDX_URL" >> $GITHUB_OUTPUT
          echo "rootfs_sha256=$SECRETVM_ROOTFS_TDX_SHA256" >> $GITHUB_OUTPUT

      - name: Cache SecretVM rootfs
        id: cache-rootfs
        uses: actions/cache@v5
        with:
          path: /tmp/secretvm-artifacts
          key: secretvm-${{ steps.secretvm-config.outputs.release }}-${{ steps.secretvm-config.outputs.rootfs_variant }}

      - name: Download SecretVM rootfs
        if: steps.cache-rootfs.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/secretvm-artifacts
          echo "⬇️  Downloading SecretVM rootfs (${{ steps.secretvm-config.outputs.release }})..."
          ROOTFS_FILE="/tmp/secretvm-artifacts/${{ steps.secretvm-config.outputs.rootfs_variant }}.iso"
          curl -L --retry 3 --retry-delay 5 -o "$ROOTFS_FILE" \
            "${{ steps.secretvm-config.outputs.rootfs_url }}"
          
          ACTUAL_SHA=$(sha256sum "$ROOTFS_FILE" | cut -d' ' -f1)
          EXPECTED_SHA="${{ steps.secretvm-config.outputs.rootfs_sha256 }}"
          
          if [ -n "$EXPECTED_SHA" ]; then
            echo "$EXPECTED_SHA  $ROOTFS_FILE" | sha256sum -c -
            echo "✅ SecretVM rootfs downloaded and verified" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️  No expected SHA256 configured — rootfs hash: \`$ACTUAL_SHA\`" >> $GITHUB_STEP_SUMMARY
            echo "   PIN THIS in .github/tee/secretvm.env as SECRETVM_ROOTFS_TDX_SHA256" >> $GITHUB_STEP_SUMMARY
          fi
          echo "   rootfs sha256: \`$ACTUAL_SHA\`" >> $GITHUB_STEP_SUMMARY

      - name: Generate deployed compose with immutable digest
        id: generate-compose
        run: |
          TEE_IMAGE="${{ needs.Generate-Tag.outputs.image_name }}-tee"
          DIGEST=${{ steps.capture-digest.outputs.digest }}
          
          sed "s|image: .*|image: ${TEE_IMAGE}@${DIGEST}|" \
            proxy-router/docker-compose.tee.yml > /tmp/docker-compose.tee.deployed.yml
          
          COMPOSE_BYTES=$(wc -c < /tmp/docker-compose.tee.deployed.yml | tr -d ' ')
          COMPOSE_SHA=$(sha256sum /tmp/docker-compose.tee.deployed.yml | cut -d' ' -f1)
          echo "compose_sha256=$COMPOSE_SHA" >> $GITHUB_OUTPUT
          
          echo "📋 Generated deployed compose (digest-pinned):" >> $GITHUB_STEP_SUMMARY
          echo "   SHA-256: \`$COMPOSE_SHA\`  (${COMPOSE_BYTES} bytes)" >> $GITHUB_STEP_SUMMARY
          echo '```yaml' >> $GITHUB_STEP_SUMMARY
          cat /tmp/docker-compose.tee.deployed.yml >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Compute RTMR3 (Intel TDX)
        id: compute-rtmr3
        run: |
          ROOTFS_FILE="/tmp/secretvm-artifacts/${{ steps.secretvm-config.outputs.rootfs_variant }}.iso"
          RTMR3=$(python3 proxy-router/scripts/compute-rtmr3.py \
            /tmp/docker-compose.tee.deployed.yml \
            "$ROOTFS_FILE" \
            --json)
          
          RTMR3_HEX=$(echo "$RTMR3" | python3 -c "import sys,json; print(json.load(sys.stdin)['rtmr3'])")
          COMPOSE_HASH=$(echo "$RTMR3" | python3 -c "import sys,json; print(json.load(sys.stdin)['compose_sha256'])")
          ROOTFS_HASH=$(echo "$RTMR3" | python3 -c "import sys,json; print(json.load(sys.stdin)['rootfs_sha256'])")
          
          echo "rtmr3=$RTMR3_HEX" >> $GITHUB_OUTPUT
          echo "🔐 Expected RTMR3: \`$RTMR3_HEX\`" >> $GITHUB_STEP_SUMMARY
          echo "   compose sha256: \`$COMPOSE_HASH\`" >> $GITHUB_STEP_SUMMARY
          echo "   rootfs sha256:  \`$ROOTFS_HASH\`" >> $GITHUB_STEP_SUMMARY

      - name: Generate and attach SBOM
        run: |
          TEE_IMAGE="${{ needs.Generate-Tag.outputs.image_name }}-tee"
          DIGEST=${{ steps.capture-digest.outputs.digest }}
          
          syft "$TEE_IMAGE@$DIGEST" -o spdx-json=sbom-tee.spdx.json
          cosign attach sbom --sbom sbom-tee.spdx.json "$TEE_IMAGE@$DIGEST"
          echo "📦 SBOM generated and attached to TEE image" >> $GITHUB_STEP_SUMMARY

      - name: Generate TEE attestation manifest
        run: |
          TEE_IMAGE="${{ needs.Generate-Tag.outputs.image_name }}-tee"
          TEE_DIGEST=${{ steps.capture-digest.outputs.digest }}
          BASE_IMAGE=${{ needs.Generate-Tag.outputs.image_name }}
          BASE_DIGEST=${{ needs.GHCR-Build-and-Push.outputs.digest }}
          BUILDTAG=${{ needs.Generate-Tag.outputs.tag_name }}
          RTMR3=${{ steps.compute-rtmr3.outputs.rtmr3 }}
          SECRETVM_RELEASE=${{ steps.secretvm-config.outputs.release }}
          ROOTFS_VARIANT=${{ steps.secretvm-config.outputs.rootfs_variant }}
          ROOTFS_SHA256=${{ steps.secretvm-config.outputs.rootfs_sha256 }}
          
          COMPOSE_SHA="sha256:$(sha256sum /tmp/docker-compose.tee.deployed.yml | cut -d' ' -f1)"
          DOCKERFILE_SHA="sha256:$(sha256sum proxy-router/Dockerfile.tee | cut -d' ' -f1)"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          jq -n \
            --arg tee_image "${TEE_IMAGE}@${TEE_DIGEST}" \
            --arg tee_image_tag "${TEE_IMAGE}:${BUILDTAG}" \
            --arg tee_digest "$TEE_DIGEST" \
            --arg base_image "${BASE_IMAGE}:${BUILDTAG}" \
            --arg base_digest "$BASE_DIGEST" \
            --arg compose_sha "$COMPOSE_SHA" \
            --arg compose_image_ref "${TEE_IMAGE}@${TEE_DIGEST}" \
            --arg dockerfile_sha "$DOCKERFILE_SHA" \
            --arg commit "${{ github.sha }}" \
            --arg ref "${{ github.ref }}" \
            --arg run_id "${{ github.run_id }}" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg timestamp "$TIMESTAMP" \
            --arg rtmr3 "$RTMR3" \
            --arg secretvm_release "$SECRETVM_RELEASE" \
            --arg rootfs_variant "$ROOTFS_VARIANT" \
            --arg rootfs_sha256 "$ROOTFS_SHA256" \
            '{
              tee_image: $tee_image,
              tee_image_tag: $tee_image_tag,
              tee_image_digest: $tee_digest,
              base_image: $base_image,
              base_image_digest: $base_digest,
              compose_sha256: $compose_sha,
              compose_image_reference: $compose_image_ref,
              dockerfile_tee_sha256: $dockerfile_sha,
              build: {
                commit: $commit,
                ref: $ref,
                workflow: "build.yml",
                run_id: $run_id,
                run_url: $run_url,
                timestamp: $timestamp
              },
              tee_platforms: ["intel-tdx", "amd-sev-snp"],
              runtime_secrets_only: [
                "WALLET_PRIVATE_KEY",
                "ETH_NODE_ADDRESS",
                "MODELS_CONFIG_CONTENT",
                "WEB_PUBLIC_URL",
                "COOKIE_CONTENT"
              ],
              baked_env: {
                DIAMOND_CONTRACT_ADDRESS: "0x6aBE1d282f72B474E54527D93b979A4f64d3030a",
                MOR_TOKEN_ADDRESS: "0x7431ada8a591c955a994a21710752ef9b882b8e3",
                BLOCKSCOUT_API_URL: "https://base.blockscout.com/api/v2",
                ETH_NODE_CHAIN_ID: "8453",
                PROXY_STORE_CHAT_CONTEXT: "false",
                LOG_COLOR: "false",
                LOG_JSON: "true",
                LOG_IS_PROD: "true",
                ENVIRONMENT: "production"
              },
              measurements: {
                intel_tdx: {
                  rtmr3: $rtmr3,
                  secretvm_release: $secretvm_release,
                  rootfs_variant: $rootfs_variant,
                  rootfs_sha256: $rootfs_sha256,
                  note: "RTMR0-2 require full reproduce-mr with firmware/kernel/templates (Phase 1b follow-up)"
                },
                amd_sev_snp: {
                  note: "SEV measurement computation not yet integrated"
                }
              }
            }' > tee-attestation-manifest.json
          
          echo "📋 TEE attestation manifest:" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat tee-attestation-manifest.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Sign and attach TEE attestation manifest
        run: |
          TEE_IMAGE="${{ needs.Generate-Tag.outputs.image_name }}-tee"
          DIGEST=${{ steps.capture-digest.outputs.digest }}
          cosign attest --yes \
            --predicate tee-attestation-manifest.json \
            --type https://morpheusais.github.io/tee-attestation/v1 \
            "$TEE_IMAGE@$DIGEST"
          echo "🔏 TEE attestation manifest signed and attached to \`$TEE_IMAGE@$DIGEST\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload deployed compose as artifact
        uses: actions/upload-artifact@v6
        with:
          name: docker-compose-tee-deployed-${{ needs.Generate-Tag.outputs.tag_name }}
          path: /tmp/docker-compose.tee.deployed.yml

      - name: Push TEE Latest Tags
        if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test' }}
        run: |
          TEE_IMAGE="${{ needs.Generate-Tag.outputs.image_name }}-tee"
          BUILDTAG=${{ needs.Generate-Tag.outputs.tag_name }}
          
          if [ "${{ github.ref_name }}" == "main" ]; then
            LATEST_TAG="latest"
          else
            LATEST_TAG="latest-test"
          fi
          
          docker buildx imagetools create -t $TEE_IMAGE:$LATEST_TAG $TEE_IMAGE:$BUILDTAG || (echo "❌ Failed to create TEE :$LATEST_TAG tag" && exit 1)
          echo "✅ TEE Image tag pushed: $TEE_IMAGE:$LATEST_TAG"

  Deploy-SecretVM-Test:
    name: Deploy TEE Image to SecretVM (test)
    if: github.ref == 'refs/heads/test' || startsWith(github.ref, 'refs/heads/cicd/')
    needs:
      - Generate-Tag
      - GHCR-Build-and-Push-TEE
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Download deployed compose artifact
        uses: actions/download-artifact@v7
        with:
          name: docker-compose-tee-deployed-${{ needs.Generate-Tag.outputs.tag_name }}
          path: /tmp

      - name: Deploy to SecretVM test instance
        env:
          SECRETVM_API_KEY: ${{ secrets.SECRETVM_API_KEY }}
          SECRETVM_TEST_VM_UUID: ${{ secrets.SECRETVM_TEST_VM_UUID }}
          SECRETVM_TEST_ENV_B64: ${{ secrets.SECRETVM_TEST_ENV }}
        run: |
          if [ -z "$SECRETVM_API_KEY" ] || [ -z "$SECRETVM_TEST_VM_UUID" ] || [ -z "$SECRETVM_TEST_ENV_B64" ]; then
            echo "⏭️  SecretVM secrets not configured — skipping deploy" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          npm install --global secretvm-cli

          echo "$SECRETVM_TEST_ENV_B64" | base64 -d > /tmp/secretvm-test.env

          echo "🚀 Updating SecretVM test instance ${SECRETVM_TEST_VM_UUID:0:8}..." >> $GITHUB_STEP_SUMMARY

          secretvm-cli -k "$SECRETVM_API_KEY" vm edit "$SECRETVM_TEST_VM_UUID" \
            --docker-compose /tmp/docker-compose.tee.deployed.yml \
            --env /tmp/secretvm-test.env

          rm -f /tmp/secretvm-test.env

          echo "✅ SecretVM test instance updated with new TEE image" >> $GITHUB_STEP_SUMMARY
          echo "   Compose: \`docker-compose-tee-deployed-${{ needs.Generate-Tag.outputs.tag_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "   Expected RTMR3: \`${{ needs.GHCR-Build-and-Push-TEE.outputs.rtmr3 }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Verify attestation after deploy
        env:
          SECRETVM_API_KEY: ${{ secrets.SECRETVM_API_KEY }}
          SECRETVM_TEST_VM_UUID: ${{ secrets.SECRETVM_TEST_VM_UUID }}
          EXPECTED_RTMR3: ${{ needs.GHCR-Build-and-Push-TEE.outputs.rtmr3 }}
        run: |
          if [ -z "$SECRETVM_API_KEY" ] || [ -z "$SECRETVM_TEST_VM_UUID" ] || [ -z "$EXPECTED_RTMR3" ]; then
            echo "⏭️  Skipping attestation verify (missing secrets or RTMR3)" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "⏳ Waiting for VM to reboot with new image..." >> $GITHUB_STEP_SUMMARY

          # vm attestation returns raw TDX quote hex; extract RTMR3 from known offset
          # TDX Quote v4: 48-byte header + TD Report Body
          # RTMR3 at body offset 472 bytes (48 bytes long)
          RTMR3_HEX_START=$(( (48 + 472) * 2 ))
          RTMR3_HEX_LEN=96

          MAX_ATTEMPTS=12
          SLEEP_SECS=30
          MATCHED=false

          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "  Attestation poll attempt $i/$MAX_ATTEMPTS..."

            RAW_QUOTE=$(secretvm-cli -k "$SECRETVM_API_KEY" vm attestation "$SECRETVM_TEST_VM_UUID" 2>/dev/null) || true

            LIVE_RTMR3=$(echo "$RAW_QUOTE" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              raw = data.get('result', '')
              rtmr3 = raw[$RTMR3_HEX_START:$RTMR3_HEX_START+$RTMR3_HEX_LEN]
              if len(rtmr3) == $RTMR3_HEX_LEN:
                  print(rtmr3)
              else:
                  print('')
          except:
              print('')
          " 2>/dev/null)

            if [ -n "$LIVE_RTMR3" ]; then
              echo "  Got RTMR3: ${LIVE_RTMR3:0:16}..."

              if [ "$LIVE_RTMR3" = "$EXPECTED_RTMR3" ]; then
                MATCHED=true
                echo "🎉 **RTMR3 MATCH** — attestation verified!" >> $GITHUB_STEP_SUMMARY
                echo "   Live RTMR3:     \`$LIVE_RTMR3\`" >> $GITHUB_STEP_SUMMARY
                echo "   Expected RTMR3: \`$EXPECTED_RTMR3\`" >> $GITHUB_STEP_SUMMARY
                break
              else
                echo "  RTMR3 mismatch (VM may still be rebooting)"
                echo "    live:     $LIVE_RTMR3"
                echo "    expected: $EXPECTED_RTMR3"
              fi
            else
              echo "  No attestation data yet (VM may still be starting)"
            fi

            if [ "$i" -lt "$MAX_ATTEMPTS" ]; then
              sleep $SLEEP_SECS
            fi
          done

          if [ "$MATCHED" = false ]; then
            echo "⚠️ **RTMR3 mismatch after ${MAX_ATTEMPTS} attempts** (${SLEEP_SECS}s × ${MAX_ATTEMPTS} = $(( SLEEP_SECS * MAX_ATTEMPTS ))s)" >> $GITHUB_STEP_SUMMARY
            echo "   Live RTMR3:     \`${LIVE_RTMR3:-unavailable}\`" >> $GITHUB_STEP_SUMMARY
            echo "   Expected RTMR3: \`$EXPECTED_RTMR3\`" >> $GITHUB_STEP_SUMMARY
            echo "   This may indicate the VM is still rebooting, or there is a genuine mismatch." >> $GITHUB_STEP_SUMMARY
            echo "   Check manually: \`secretvm-cli vm attestation $SECRETVM_TEST_VM_UUID\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  Build-Service-Executables:
    name: Build Service Executables
    # TEMPORARILY DISABLED — re-enable when merging to main/test
    # Disabling this cascades: all UI-* build jobs and UI-Release are skipped.
    if: false
    # if: |
    #   github.repository == 'MorpheusAIs/Morpheus-Lumerin-Node' &&
    #   (
    #     (github.event_name == 'push' && (startsWith(github.ref, 'refs/heads/cicd/') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test')) ||
    #     (github.event_name == 'workflow_dispatch' && github.event.inputs.build_all_os == 'true') 
    #   )
    needs:
      - Generate-Tag
      - Go-Module-Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"
          cache-dependency-path: |
            proxy-router/go.sum
            cli/go.sum

      - name: Cache Go build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Build proxy-router executables for all platforms 
        run: |
          FULLTAG=${{ needs.Generate-Tag.outputs.vfull }}
          cd proxy-router
          
          # Ensure go.sum is up to date and download dependencies
          go mod tidy
          go mod download
          
          # Build all platforms in parallel using background jobs
          echo "🚀 Building proxy-router executables..."

          # Linux X64
          echo "🚀 Building Linux X64 executable..."
          TAG_NAME=${{ needs.Generate-Tag.outputs.tag_name }} GOOS=linux GOARCH=amd64 OUTPUT=proxy-router-${FULLTAG}-linux-amd64 ./build.sh || (echo "❌ Failed to build Linux X64 executable" && exit 1)
          mv proxy-router linux-x86_64-morpheus-router-${FULLTAG}
          
          # Linux ARM64 (Raspberry Pi, AWS Graviton)
          echo "🚀 Building Linux ARM64 executable..."
          TAG_NAME=${{ needs.Generate-Tag.outputs.tag_name }} GOOS=linux GOARCH=arm64 OUTPUT=proxy-router-${FULLTAG}-linux-arm64 ./build.sh || (echo "❌ Failed to build Linux ARM64 executable" && exit 1)
          mv proxy-router linux-arm64-morpheus-router-${FULLTAG}
          
          # macOS Intel
          echo "🚀 Building macOS X64 executable..."
          TAG_NAME=${{ needs.Generate-Tag.outputs.tag_name }} GOOS=darwin GOARCH=amd64 OUTPUT=proxy-router-${FULLTAG}-mac-amd64 ./build.sh || (echo "❌ Failed to build macOS X64 executable" && exit 1)
          mv proxy-router mac-x64-morpheus-router-${FULLTAG}
          
          # macOS ARM (Apple Silicon)
          echo "🚀 Building macOS ARM64 executable..."
          TAG_NAME=${{ needs.Generate-Tag.outputs.tag_name }} GOOS=darwin GOARCH=arm64 OUTPUT=proxy-router-${FULLTAG}-mac-arm64 ./build.sh || (echo "❌ Failed to build macOS ARM64 executable" && exit 1)
          mv proxy-router mac-arm64-morpheus-router-${FULLTAG}
          
          # Windows X64
          echo "🚀 Building Windows X64 executable..."
          TAG_NAME=${{ needs.Generate-Tag.outputs.tag_name }} GOOS=windows GOARCH=amd64 OUTPUT=proxy-router-${FULLTAG}-win-amd64.exe ./build.sh || (echo "❌ Failed to build Windows X64 executable" && exit 1)
          mv proxy-router win-x64-morpheus-router-${FULLTAG}.exe
          
          echo "✅ Built Proxy Router executables for all platforms"

      - name: Build CLI Executables for all platforms
        run: |
          FULLTAG=${{ needs.Generate-Tag.outputs.vfull }}
          cd cli
          
          # Ensure go.sum is up to date and download dependencies
          go mod tidy
          go mod download
          
          # Build all platforms in parallel
          echo "🚀 Building CLI executables..."
          
          # Linux X64
          echo "🚀 Building Linux X64 CLI executable..."
          GOOS=linux GOARCH=amd64 make build || (echo "❌ Failed to build Linux X64 executable" && exit 1)
          mv mor-cli linux-x86_64-morpheus-cli-${FULLTAG}
          
          # Linux ARM64 (Raspberry Pi, AWS Graviton)
          echo "🚀 Building Linux ARM64 CLI executable..."
          GOOS=linux GOARCH=arm64 make build || (echo "❌ Failed to build Linux ARM64 executable" && exit 1)
          mv mor-cli linux-arm64-morpheus-cli-${FULLTAG}
          
          # macOS Intel
          echo "🚀 Building macOS X64 CLI executable..."
          GOOS=darwin GOARCH=amd64 make build || (echo "❌ Failed to build macOS X64 executable" && exit 1)
          mv mor-cli mac-x64-morpheus-cli-${FULLTAG}
          
          # macOS ARM (Apple Silicon)
          echo "🚀 Building macOS ARM64 CLI executable..."
          GOOS=darwin GOARCH=arm64 make build || (echo "❌ Failed to build macOS ARM64 executable" && exit 1)
          mv mor-cli mac-arm64-morpheus-cli-${FULLTAG}
          
          # Windows X64
          echo "🚀 Building Windows X64 CLI executable..."
          GOOS=windows GOARCH=amd64 make build || (echo "❌ Failed to build Windows X64 executable" && exit 1)
          mv mor-cli win-x64-morpheus-cli-${FULLTAG}.exe
          
          echo "✅ Built CLI executables for all platforms"


      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v6
        with:
          name: cli
          path: |
            cli/linux-x86_64-morpheus-cli-${{ needs.Generate-Tag.outputs.vfull }}
            cli/linux-arm64-morpheus-cli-${{ needs.Generate-Tag.outputs.vfull }}
            cli/mac-x64-morpheus-cli-${{ needs.Generate-Tag.outputs.vfull }}
            cli/mac-arm64-morpheus-cli-${{ needs.Generate-Tag.outputs.vfull }}
            cli/win-x64-morpheus-cli-${{ needs.Generate-Tag.outputs.vfull }}.exe
    
      - name: Upload ProxyRouter artifacts
        uses: actions/upload-artifact@v6
        with:
          name: proxy-router
          path: |
            proxy-router/linux-x86_64-morpheus-router-${{ needs.Generate-Tag.outputs.vfull }}
            proxy-router/linux-arm64-morpheus-router-${{ needs.Generate-Tag.outputs.vfull }}
            proxy-router/mac-x64-morpheus-router-${{ needs.Generate-Tag.outputs.vfull }}
            proxy-router/mac-arm64-morpheus-router-${{ needs.Generate-Tag.outputs.vfull }}
            proxy-router/win-x64-morpheus-router-${{ needs.Generate-Tag.outputs.vfull }}.exe

  Deploy-to-Titan:
    name: Deploy to Titan via GitHub Actions
    if: |
      github.repository == 'MorpheusAIs/Morpheus-Lumerin-Node' &&
      (
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test')) ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.build_all_os == 'true' && github.event.inputs.create_deployment == 'true')
      )
    needs:
      - Generate-Tag
      - GHCR-Build-and-Push
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.TITAN_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.TITAN_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to Titan ECS
        run: |
          # For deployment, use the newly built image
          BUILDTAG=${{ needs.Generate-Tag.outputs.tag_name }}
          BUILDIMAGE=${{ needs.Generate-Tag.outputs.image_name }}
          
          # Determine environment based on branch
          if [ "${{ github.ref_name }}" == "test" ]; then
            ENV="dev"
          elif [ "${{ github.ref_name }}" == "main" ]; then
            ENV="lmn"
          else
            echo "❌ Unsupported branch for deployment: ${{ github.ref_name }}"
            exit 1
          fi
          
          echo "🚀 Deploying to Titan AWS - Environment: $ENV"
          echo "📦 Container Image: $BUILDIMAGE:$BUILDTAG"
          
          # ECS deployment variables
          CLUSTER_NAME="ecs-morpheus-router-${ENV}-use1"
          SERVICE_NAME="svc-morpheus-router-${ENV}-use1"
          TASK_FAMILY="tsk-morpheus-router"
          CONTAINER_NAME="morpheus-router-container"
          
          # Get current task definition
          echo "📋 Retrieving current task definition..."
          CURRENT_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" \
            --query 'taskDefinition' \
            --output json)
          
          if [ $? -ne 0 ]; then
            echo "❌ Failed to retrieve current task definition"
            exit 1
          fi
          
          # Update the image in the task definition
          echo "🔄 Creating new task definition with image: $BUILDIMAGE:$BUILDTAG"
          NEW_TASK_DEF=$(echo "$CURRENT_TASK_DEF" | jq --arg IMAGE "$BUILDIMAGE:$BUILDTAG" --arg CONTAINER "$CONTAINER_NAME" '
            {
              family: .family,
              networkMode: .networkMode,
              requiresCompatibilities: .requiresCompatibilities,
              cpu: .cpu,
              memory: .memory,
              taskRoleArn: .taskRoleArn,
              executionRoleArn: .executionRoleArn,
              volumes: .volumes,
              containerDefinitions: (.containerDefinitions | map(
                if .name == $CONTAINER then
                  .image = $IMAGE
                else
                  .
                end
              ))
            }
          ')
          
          # Debug: Check if JSON is valid
          echo "🔍 Validating JSON structure..."
          echo "$NEW_TASK_DEF" | jq empty
          if [ $? -ne 0 ]; then
            echo "❌ Generated JSON is invalid"
            echo "Generated JSON:"
            echo "$NEW_TASK_DEF"
            exit 1
          fi
          
          # Debug: Show task definition summary
          echo "🔍 Task definition summary:"
          echo "$NEW_TASK_DEF" | jq '.family, .cpu, .memory, .networkMode, .requiresCompatibilities, (.containerDefinitions | length)'
          
          # Register new task definition
          echo "📝 Registering new task definition..."
          
          # Save JSON to temporary file to avoid stdin issues
          TEMP_JSON_FILE="/tmp/task_definition_$$.json"
          echo "$NEW_TASK_DEF" > "$TEMP_JSON_FILE"
          
          # Validate the temp file
          jq empty "$TEMP_JSON_FILE"
          if [ $? -ne 0 ]; then
            echo "❌ Temporary file contains invalid JSON"
            rm -f "$TEMP_JSON_FILE"
            exit 1
          fi
          
          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json "file://$TEMP_JSON_FILE" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          
          # Clean up temp file
          rm -f "$TEMP_JSON_FILE"
          
          if [ $? -ne 0 ] || [ -z "$NEW_TASK_ARN" ]; then
            echo "❌ Failed to register new task definition"
            exit 1
          fi
          
          echo "✅ New task definition registered: $NEW_TASK_ARN"
          
          # Update the ECS service
          echo "🔄 Updating ECS service..."
          UPDATE_RESULT=$(aws ecs update-service \
            --cluster "$CLUSTER_NAME" \
            --service "$SERVICE_NAME" \
            --task-definition "$NEW_TASK_ARN" \
            --force-new-deployment \
            --query 'service.{serviceName:serviceName,taskDefinition:taskDefinition,desiredCount:desiredCount,runningCount:runningCount,pendingCount:pendingCount}' \
            --output json)
          
          echo "📊 Service Update Summary:"
          echo "$UPDATE_RESULT" | jq .
          
          if [ $? -ne 0 ]; then
            echo "❌ Failed to update ECS service"
            exit 1
          fi
          
          echo "✅ ECS service update initiated successfully"
          echo "🎯 Environment: $ENV"
          echo "🏗️  Cluster: $CLUSTER_NAME"
          echo "⚙️  Service: $SERVICE_NAME"
          echo "📦 Image: $BUILDIMAGE:$BUILDTAG"
          echo "📋 Task Definition: $NEW_TASK_ARN"
          
          # Wait for deployment to stabilize with extended timeout
          echo "⏳ Waiting for service to stabilize (up to 15 minutes)..."
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME" \
            --cli-read-timeout 900 \
            --cli-connect-timeout 60
          
          STABILIZATION_STATUS=$?
          
          if [ $STABILIZATION_STATUS -eq 0 ]; then
            echo "✅ ECS service stabilized successfully"
          else
            echo "⚠️ ECS stabilization wait timed out, but continuing with health check..."
          fi
          
          # Determine the public endpoint for health check
          if [ "$ENV" == "dev" ]; then
            HEALTH_ENDPOINT="https://morpheusapi.dev.lumerin.io/healthcheck"
          elif [ "$ENV" == "lmn" ]; then
            HEALTH_ENDPOINT="https://morpheusapi.lmn.lumerin.io/healthcheck"
          fi
          
          echo "🔍 Verifying deployment version at: $HEALTH_ENDPOINT"
          
          # Wait for the service to be reachable and verify version
          MAX_HEALTH_RETRIES=20
          HEALTH_RETRY_COUNT=0
          VERSION_VERIFIED=false
          
          while [ $HEALTH_RETRY_COUNT -lt $MAX_HEALTH_RETRIES ]; do
            echo "🔄 Health check attempt $((HEALTH_RETRY_COUNT + 1))/$MAX_HEALTH_RETRIES..."
            
            # Get health check response with browser-like headers to bypass WAF
            HEALTH_RESPONSE=$(curl -s --max-time 10 \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/119.0.0.0 Safari/537.36" \
              -H "Accept: application/json, text/plain, */*" \
              -H "Accept-Language: en-US,en;q=0.9" \
              "$HEALTH_ENDPOINT" 2>/dev/null)
            CURL_STATUS=$?
            
            if [ $CURL_STATUS -eq 0 ] && [ -n "$HEALTH_RESPONSE" ]; then
              echo "📡 Health response: $HEALTH_RESPONSE"
              
              # Parse version from JSON response
              DEPLOYED_VERSION=$(echo "$HEALTH_RESPONSE" | jq -r '(.version // .Version // empty)' 2>/dev/null)
              UPTIME=$(echo "$HEALTH_RESPONSE" | jq -r '(.uptime // .Uptime // empty)' 2>/dev/null)
              STATUS=$(echo "$HEALTH_RESPONSE" | jq -r '(.status // .Status // empty)' 2>/dev/null)
              
              if [ -n "$DEPLOYED_VERSION" ] && [ "$STATUS" = "healthy" ]; then
                echo "🏥 Service Status: $STATUS"
                echo "📦 Deployed Version: $DEPLOYED_VERSION"
                echo "⏰ Service Uptime: $UPTIME"
                
                # Check if deployed version matches expected version
                if [[ "$DEPLOYED_VERSION" == *"$BUILDTAG"* ]] || [[ "$BUILDTAG" == *"$DEPLOYED_VERSION"* ]]; then
                  echo "✅ Version verification successful! Deployed version matches expected tag."
                  VERSION_VERIFIED=true
                  break
                else
                  echo "⚠️ Version mismatch - Expected: $BUILDTAG, Deployed: $DEPLOYED_VERSION"
                fi
              else
                echo "⚠️ Service not healthy or version not available"
              fi
            else
              echo "⚠️ Health check failed (curl status: $CURL_STATUS)"
            fi
            
            HEALTH_RETRY_COUNT=$((HEALTH_RETRY_COUNT + 1))
            if [ $HEALTH_RETRY_COUNT -lt $MAX_HEALTH_RETRIES ]; then
              echo "⏳ Waiting 15 seconds before retry..."
              sleep 15
            fi
          done
          
          # Final deployment status
          if [ "$VERSION_VERIFIED" = true ]; then
            echo ""
            echo "🎉 Deployment completed successfully!"
            echo "✅ Service is healthy and running the expected version"
            echo "🌐 Health Check URL: $HEALTH_ENDPOINT"
          else
            echo ""
            echo "❌ Deployment verification failed!"
            echo "🔍 The service may still be starting up or there may be an issue"
            echo "🌐 Manual check: $HEALTH_ENDPOINT"
            echo "🏗️  Expected version: $BUILDTAG"
            if [ -n "$DEPLOYED_VERSION" ]; then
              echo "📦 Currently deployed: $DEPLOYED_VERSION"
            fi
            echo ""
            echo "ℹ️ This may be a temporary issue. Check the health endpoint in a few minutes."
            echo "ℹ️ If the issue persists, check AWS ECS console and CloudWatch logs."
            
            # Don't fail the deployment for version mismatch, as it might be a timing issue
            # The ECS service update was successful, version verification is informational
            echo "⚠️ Continuing with warning - ECS deployment completed but version verification inconclusive"
          fi

