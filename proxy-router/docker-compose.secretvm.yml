services:
  proxy-router:
    image: ghcr.io/morpheusais/morpheus-lumerin-node:v5.14.0
    restart: unless-stopped
    ports:
      - "8082:8082"
      - "3333:3333"
    volumes:
      - proxy_data:/app/data
    # NOTE: no Docker-level healthcheck because image is FROM scratch (no shell/curl/wget).
    # The /healthcheck endpoint on port 8082 is available for external monitoring.
    environment:
      # ---- Wallet (REQUIRED - set via SecretVM Encrypted Secrets) ----
      - WALLET_PRIVATE_KEY=${WALLET_PRIVATE_KEY}

      # ---- Blockchain / BASE Mainnet ----
      - DIAMOND_CONTRACT_ADDRESS=0x6aBE1d282f72B474E54527D93b979A4f64d3030a
      - MOR_TOKEN_ADDRESS=0x7431ada8a591c955a994a21710752ef9b882b8e3
      - BLOCKSCOUT_API_URL=https://base.blockscout.com/api/v2
      - ETH_NODE_CHAIN_ID=8453
      - ETH_NODE_ADDRESS=${ETH_NODE_ADDRESS}
      - ETH_NODE_USE_SUBSCRIPTIONS=false
      - ETH_NODE_LEGACY_TX=false
      - ENVIRONMENT=production

      # ---- Proxy ----
      - PROXY_ADDRESS=0.0.0.0:3333
      - PROXY_STORE_CHAT_CONTEXT=false
      - PROXY_STORAGE_PATH=/app/data/

      # ---- Web / API ----
      - WEB_ADDRESS=0.0.0.0:8082
      - WEB_PUBLIC_URL=${WEB_PUBLIC_URL:-http://localhost:8082}

      # ---- Auth ----
      - COOKIE_CONTENT=${COOKIE_CONTENT:-admin:admin}

      # ---- Models (override via Encrypted Secrets for your provider config) ----
      - MODELS_CONFIG_CONTENT=${MODELS_CONFIG_CONTENT}

      # ---- Logging (TEE-appropriate: no color, JSON, production) ----
      - LOG_COLOR=false
      - LOG_JSON=true
      - LOG_IS_PROD=true
      - LOG_LEVEL_APP=info
      - LOG_LEVEL_TCP=warn
      - LOG_LEVEL_ETH_RPC=warn
      - LOG_LEVEL_STORAGE=warn

      # ---- Timeouts ----
      - LLM_TIMEOUT=4m
      - CNODE_PNODE_TIMEOUT=90s
      - CNODE_PNODE_MAX_RETRIES=3
      - CNODE_PNODE_AUDIO_MAX_RETRIES=20

volumes:
  proxy_data:
